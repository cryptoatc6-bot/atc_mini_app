<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ATC Miner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #999999);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f0f0f0);
            --accent: #f1c40f;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            box-sizing: border-box;
            
            /* Полная блокировка выделения текста */
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
            
            /* Убираем синий фон при нажатии на мобилках */
            -webkit-tap-highlight-color: transparent;
        }

        .header { text-align: center; margin-top: 10px; flex: 0; }
        #score { font-size: 40px; font-weight: 900; margin: 0; letter-spacing: -1px; }
        .hint { color: var(--hint); font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; }

        .main-game {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .coin-wrapper { 
            position: relative; 
            perspective: 1000px;
            /* Защита от контекстного меню при долгом тапе на картинку */
            -webkit-touch-callout: none; 
        }
        
        .coin { transition: transform 0.1s; transform-style: preserve-3d; cursor: pointer; }
        .coin img { width: 220px; height: auto; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.1)); pointer-events: none; }

        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 350px;
            margin-bottom: 30px;
        }

        .stat-card {
            background-color: var(--sec-bg);
            padding: 12px;
            border-radius: 16px;
            text-align: center;
        }

        .stat-label { display: block; color: var(--hint); font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .stat-value { font-size: 15px; font-weight: 800; color: var(--accent); }

        .plus-one {
            position: absolute;
            color: var(--accent);
            font-weight: 900;
            font-size: 24px;
            animation: moveUp 0.6s ease-out forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes moveUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>

    <div class="header">
        <p id="score">0.00000 ATC</p>
        <span class="hint">Твой баланс</span>
    </div>

    <div class="main-game">
        <div class="coin-wrapper" id="clicker">
            <div class="coin" id="atc-coin">
                <img src="button.png" alt="Mine">
            </div>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <span class="stat-label">Кликов</span>
            <span id="clicks-count" class="stat-value">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">За смену</span>
            <span id="session-mined" class="stat-value">0.00000</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const clickPower = 0.00001;

        // Состояние
        let initialValue = parseFloat(new URLSearchParams(window.location.search).get('balance')) || 0;
        let currentScore = initialValue;
        let clicks = 0;

        const scoreDisplay = document.getElementById('score');
        const clicksDisplay = document.getElementById('clicks-count');
        const sessionDisplay = document.getElementById('session-mined');
        const atcCoin = document.getElementById('atc-coin');

        function updateUI() {
            scoreDisplay.innerText = currentScore.toFixed(5) + " ATC";
            clicksDisplay.innerText = clicks;
            sessionDisplay.innerText = (currentScore - initialValue).toFixed(5);
        }

        document.getElementById('clicker').addEventListener('click', (e) => {
            currentScore += clickPower;
            clicks++;
            updateUI();

            // Анимация наклона
            const rect = e.currentTarget.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            atcCoin.style.transform = `perspective(1000px) scale(0.95) rotateX(${-y/10}deg) rotateY(${x/10}deg)`;
            setTimeout(() => atcCoin.style.transform = '', 100);

            tg.HapticFeedback.impactOccurred('light');
            createPlus(e.clientX, e.clientY);
        });

        function createPlus(x, y) {
            const plus = document.createElement('div');
            plus.innerText = `+${clickPower.toFixed(5)}`;
            plus.className = 'plus-one';
            plus.style.left = `${x - 20}px`;
            plus.style.top = `${y - 20}px`;
            document.body.appendChild(plus);
            setTimeout(() => plus.remove(), 600);
        }

        // Главная кнопка Telegram
        tg.MainButton.setText("СОХРАНИТЬ ПРОГРЕСС");
        tg.MainButton.show();
        tg.MainButton.onClick(async () => {
            tg.MainButton.showProgress();
            
            const payload = {
                initData: tg.initData,
                diff: (currentScore - initialValue).toFixed(5),
                clicks: clicks
            };

            try {
                const response = await fetch('https://vanya19012111test.pythonanywhere.com/post', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    tg.close();
                } else {
                    alert("Ошибка сохранения. Попробуй еще раз.");
                    tg.MainButton.hideProgress();
                }
            } catch (err) {
                alert("Нет связи с сервером.");
                tg.MainButton.hideProgress();
            }
        });

        updateUI();
    </script>
</body>
</html>
